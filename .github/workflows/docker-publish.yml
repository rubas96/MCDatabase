name: Build & publish sync-server image

# Construye la imagen del servidor de sincronización (carpeta sync-server/)
# y la publica en GitHub Container Registry (ghcr.io/rubas96/mc-sync).
on:
  push:
    branches: [main]
    paths:
      - "sync-server/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sync-server
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/rubas96/mc-sync:latest
            ghcr.io/rubas96/mc-sync:1.0
